  correlative: claim-right
  divisible: null
  tradable: null
  notes: 'Negative duty (must refrain), taken from the burdened party''s side, for the duty-correlative
    form. Disability-type restrictions are not duties at all: the landowner is in no-privilege and the
    authority holds the reserved position.'
ladm_mapping:
