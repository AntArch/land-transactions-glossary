id: restriction
term: Restriction
abbreviation: null
alt_labels: []
status: stable
category: legal-concept
definition: >-
  A negative duty (the holder must refrain) imposed on land or its use. In Hohfeldian terms a restriction
  is the landowners' duty that results from a claim-right held by a third party; it differs from
  a *responsibility* only in the direction of the obligation (negative vs positive). A duty-correlative
  restriction (a restrictive covenant, a planning obligation owed to an identified body) is released when
  that holder waives or is satisfied; a disability-type restriction (a development right reserved to the
  authority) leaves the landowner in a position of *no-privilege* that a permit does not lift but a privilege-allocation
  supplies. See *Responsibility*, *Reserved incidents*, *No-privilege*.
see_also:
- responsibility
- reserved-incidents
- no-privilege
broader: null
counterpart_of: null
