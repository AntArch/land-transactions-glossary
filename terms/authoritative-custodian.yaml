id: authoritative-custodian
term: Authoritative custodian
abbreviation: null
alt_labels: []
status: stable
category: governance-concept
definition: >-
  The agency with the mandate to define, maintain, publish, and correct a given dataset or service. Other
  agencies reference the custodian's data rather than maintaining diverging local copies. See also: *once-only
  principle*, *shadow infrastructure*.
see_also:
- once-only-principle
- shadow-infrastructure
broader: null
counterpart_of: null
