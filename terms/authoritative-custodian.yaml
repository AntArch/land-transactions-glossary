composed_of: []
applies_to: []
hohfeldian_signature: null
ladm_mapping:
  relation: no-counterpart
  iso_19152_clause: null
  notes: LADM identifies parties and sources but defines no custodianship or mandate concept; the register
    holder appears in Part 2 land registration without a generic custodian term.
citations: []
