id: correction
term: Correction
abbreviation: null
alt_labels: []
status: draft
category: register-operation
definition: >-
  A custodian-initiated register write that brings the record up to date or repairs a clerical defect
  without prejudicing any party's position — completing a cross-reference, conforming a name, updating
  a derived attribute. Like *Rectification* it is performed by the *authoritative custodian* under its
  *mandate* rather than by parties transacting; unlike rectification it alters no party's substantive
  position and so carries no indemnity consequences. Both are recorded on the transaction timeline under
  *bitemporality*.
see_also:
