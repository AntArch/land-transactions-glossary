id: iam
term: IAM (Identity and Access Management)
abbreviation: IAM
alt_labels:
- Identity and Access Management
status: stable
category: technology
definition: >-
  The systems and processes governing digital identities, authentication (confirming who a party is),
  authorisation (defining what they may do), delegation and representation relationships, and the audit
  trail of actions taken under each identity. In this strategy, IAM is the recommended implementation
  vehicle for the *Party and Representation service*, covering representation chains, power-of-attorney
  delegation, company signatory verification, and audited access to transaction services.
