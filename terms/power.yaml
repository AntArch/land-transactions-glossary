id: power
term: Power (legal)
abbreviation: null
alt_labels: []
status: stable
category: jural-position
definition: >-
  The legal capacity to effect a specific change in a Party--Right--Land relationship. Private-law powers
  derive from rights held (a party can only grant what it has); public-law powers derive from legislative
  or regulatory authority. Verification of power is a prerequisite for any valid transaction.
