# Term record: VoI (Variation of Incidents)
# Schema: see /schema/term.schema.yaml. ladm_mapping.relation must be one of:
#   equivalent | refines | extends | conflicts-with | no-counterpart
id: voi
term: VoI (Variation of Incidents)
abbreviation: VoI
alt_labels:
- Variation of Incidents
status: stable
category: transaction-primitive
definition: >-
  The primitive that creates, varies, or terminates any jural incident (conventional, reserved, or allocated)
  associated with a land object. Its two directions are *derivation* (establishing a new incident from
  an authorised source) and *termination* (closing an existing incident). Termination form is matched
  to incident type: *absorption* for conventional incidents, *extinguishment* for allocated incidents,
  *rescission* for reserved incidents. The recognised set covers the private-law *numerus clausus*, the
  jurisdiction's recognised PLR types, and its recognised statutory authorisation types. Conventional
  derivation is recursive; allocated incidents are not. For conventional incidents, VoI derivation is
  always followed by an allocating VoP (the *alienation* pattern); for allocated incidents, derivation
  and transfer are a single act. VoI also separates jural content changes (its domain) from spatial extent
  changes (VoL's domain).
