id: hohfeldian-analysis
term: Hohfeldian analysis
abbreviation: null
alt_labels: []
status: stable
category: analytical-framework
definition: >-
  A framework for legal analysis, developed by Wesley Hohfeld, that decomposes legal relations into atomic
  units: claim-rights, privileges (liberties), powers, and immunities. Used in this paper to distinguish
  a *privilege* (a freedom to act, owed to no other party) from a *claim-right* (an entitlement enforceable
  against another), and to characterise the legal nature of permits as privilege-allocations from the
  granting authority's own jural position. See *Claim-right*, *Immunity*, *No-privilege*, *Privilege*.
see_also:
