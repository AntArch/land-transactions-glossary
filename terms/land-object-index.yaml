id: land-object-index
term: Land Object index
abbreviation: null
alt_labels: []
status: stable
category: platform-service
definition: >-
  A shared service that mints stable, persistent cross-agency identifiers for land objects and resolves
  any identifier to the authoritative service that owns it. It does not consolidate geometry; it provides
  a single resolution point so that rights and permits can unambiguously reference "what land" regardless
  of which custodian holds the authoritative geometry. New identifiers are published only after the relevant
  authority service has validated and committed the corresponding spatial change. See *Cadastral index*,
  *Identifier*, *Once-only principle*.
see_also:
- cadastral-index
- identifier
- once-only-principle
