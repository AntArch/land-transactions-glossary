id: consent-principle
term: Consent principle
abbreviation: null
alt_labels: []
status: stable
category: acceptance-principle
definition: >-
  One of the five acceptance criteria (a validity check). Requires that where private rights are affected
  the right-holder's consent is demonstrated and validated, including verification of any authorised representation.
