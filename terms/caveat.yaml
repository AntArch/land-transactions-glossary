id: caveat
term: Caveat
abbreviation: null
alt_labels:
- Caution
- Inhibition
- Notice
status: draft
category: register-concept
definition: >-
  A register object lodged by a party claiming an interest in a *land object*, whose effect is to block
  or condition the registration of subsequent dealings until the claim is resolved or the caveat lapses.
  A caveat is not itself a jural incident in the land: it operates on the *admissibility* of later transactions
  rather than conferring rights, protecting the caveator's claimed position while it is determined. Jurisdictional
  names vary: caution, inhibition, notice.
see_also:
- admissibility-principle
- priority
- dealing
