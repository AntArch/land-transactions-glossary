id: dealing
term: Dealing
abbreviation: null
alt_labels: []
status: stable
category: register-concept
definition: >-
  Used in two distinct senses. (1) *Tradability sense*: an onward market transfer of a tradable
  right after its initial allocation: the subsequent independent trading of freehold, leasehold, mortgage,
  or strata interests. Every dealing is a transaction, but not every transaction is a dealing: the initial
  grant of a right is a transaction (alienation) but not a dealing in this sense. (2) *Land registration
  sense*: a registered act or instrument that alters an entry in the title register, the technical meaning
  in deeds and title-registration systems. Where context does not disambiguate, "transaction" is the preferred
  general term. See *Tradable*, *Transaction primitive*, *Alienation*.
see_also:
- tradable
- transaction-primitive
- alienation
