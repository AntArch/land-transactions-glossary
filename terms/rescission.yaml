id: rescission
term: Rescission
abbreviation: null
alt_labels: []
status: stable
category: transaction-operation
definition: >-
  The termination form for reserved incidents: a PLR or other public-law restriction is brought to an
  end through the same statutory or regulatory process that created it. The counterpart of its derivation.
  Distinguished from *extinguishment* (which applies to allocated incidents/privileges) and *absorption*
  (which applies to conventional incidents). See *Termination*, *Variation of Incidents*.
see_also:
- termination
- voi
broader: termination
counterpart_of: derivation
contrasted_with:
- absorption
- extinguishment
composed_of: []
applies_to:
- reserved-incidents
hohfeldian_signature: null
ladm_mapping:
  relation: no-counterpart
  iso_19152_clause: null
  notes: 'As with absorption/extinguishment: LADM has no termination-form vocabulary; a rescinded PLR
    is just a closed version of a restriction.'
citations: []
source: 'Beck, A. (2026). Glossary and definitions: the single-source terminology for the land-transactions
  portfolio.'
