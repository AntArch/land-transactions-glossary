id: derivation
term: Derivation
abbreviation: null
alt_labels: []
status: stable
category: transaction-operation
definition: >-
  One of the two directions of a *Variation of Incidents*: the establishment of a new jural incident from
  an authorised source. For conventional incidents, it carves a claim-right (lease, easement, security,
  strata interest) from a parent bundle, leaving a residual interest. For reserved incidents, it establishes
  a restriction or responsibility through a statutory or plan-making process. For allocated incidents,
  it creates a privilege through the exercise of statutory power. The counterpart of *termination*. Conventional
  derivation is recursive for certain incidents; allocated incidents are not (a permit cannot be sub-permitted).
see_also: []
broader: voi
counterpart_of: termination
