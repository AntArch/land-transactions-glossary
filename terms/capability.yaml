composed_of: []
applies_to: []
hohfeldian_signature: null
ladm_mapping:
  relation: no-counterpart
  iso_19152_clause: null
  notes: Professional registration/certification of supporting parties is not modelled; LADM party data
    is largely expected from external registers, which Part 1 places out of scope.
