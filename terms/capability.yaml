id: capability
term: Capability
abbreviation: null
alt_labels: []
status: stable
category: legal-concept
definition: >-
  "Capability" denotes the professional-competence aspect of *capacity* (the professional registration
  and certification of supporting parties (e.g., surveyors, conveyancers, certifying engineers)) required
  for a given transaction type. It is evaluated by the *capacity principle*. See *Capacity principle*.
see_also:
- capacity-principle
broader: capacity-principle
