id: shadow-infrastructure
term: Shadow infrastructure
abbreviation: null
alt_labels: []
status: stable
category: governance-concept
definition: >-
  Workaround systems or local data copies created by downstream agencies when authoritative services do
  not provide the identifier stability, versioning, or quality those agencies need. Shadow infrastructures
  diverge from the authoritative source over time and undermine the once-only principle.
