id: personal-right
term: Personal right
abbreviation: null
alt_labels:
- Right in personam
status: draft
category: legal-concept
definition: >-
  A right enforceable against a specific person rather than against the world (in personam): the buyer's
  right against the seller under contract before completion, a creditor's unsecured claim [@gretton_steven_2017].
  Personal rights are not registrable and sit outside the *numerus clausus*; conveyancing is, in one reading,
  the machinery by which a personal right (the contract) is converted into a *real right* (the registered
  incident). Contrast *Real right*.
see_also:
