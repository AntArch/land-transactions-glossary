id: lifecycle-specification
term: Lifecycle specification
abbreviation: null
alt_labels: []
status: stable
category: type-property
definition: >-
  The set of properties on a jural incident that govern when it activates and when it terminates: an effective
  period, the conditions under which it activates, and the triggers (expiry, surrender, satisfaction of
  an obligation, a staged-release milestone, or statutory rescission) that cause termination. Treating
  lifecycle as a first-class property of each incident type means that leases, easements, securities,
  permits, and PLR zones share the same structural shape with different parameters, rather than requiring
  separate instrument logic for each. See *Termination*, *Amendment*, *VoI*. Common-law future interests
  — a *reversion* retained by the granter, a *remainder* vested in a third party — are the classic instances
  of activation-conditioned incidents.
