id: immunity
term: Immunity
abbreviation: null
alt_labels: []
status: stable
category: jural-position
definition: >-
  In Hohfeldian analysis, the jural position that protects its holder from another party's power. The
  correlative of a *disability* (the other party's incapacity to alter that holder's jural position).
  Distinct from a *privilege* (freedom from a duty) and a *claim-right* (entitlement against a duty-bearer).
  Immunities arise in land administration contexts where legislative protections prevent an authority
  from unilaterally altering a registered right without due process. See *Hohfeldian analysis*, *Claim-right*,
  *Privilege*.
