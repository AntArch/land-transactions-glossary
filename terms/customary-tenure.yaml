# Term record: Customary and informal tenure
# Schema: see /schema/term.schema.yaml. ladm_mapping.relation must be one of:
#   equivalent | refines | extends | conflicts-with | no-counterpart
id: customary-tenure
term: Customary and informal tenure
abbreviation: null
alt_labels:
- Informal tenure
- Customary right
status: draft
category: legal-concept
definition: >-
  Rights held and administered under the customs of a community — frequently communal, often unwritten,
  and in a growing number of jurisdictions carrying formal legal status — as distinct from the statutory
  tenure forms this framework's *conventional incidents* presuppose. Customary and informal tenure is
  expressly within the scope of LADM but outside the scope of this glossary's transaction model, which
  assumes a register, a *numerus clausus*, and instrument-based dealing. The term is defined here to make
  that boundary deliberate and visible rather than accidental.
see_also:
- conventional-incidents
- numerus-clausus
- ladm
broader: null
counterpart_of: null
contrasted_with:
- conventional-incidents
composed_of: []
applies_to: []
hohfeldian_signature:
  jural_position: null
  correlative: null
  divisible: null
  tradable: null
  notes: 'Outside the formal typology by design: customary holdings need not decompose into the recognised
    incident classes, which is precisely why they are scope-marked rather than modelled.'
ladm_mapping:
  relation: refines
  iso_19152_clause: 'ISO 19152-1:2024, 3.1, term ''right'' (sub-clause >3.1.10, VERIFY; ISO 19152:2012:
    4.1.20 — ''formal or informal entitlement'')'
  notes: 'A deliberate scope divergence: LADM expressly admits informal and customary tenure within ''right'';
    this glossary''s transaction model does not, and says so. The divergence is one to surface explicitly
    in the SWG mapping.'
