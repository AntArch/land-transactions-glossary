# Term record: Customary and informal tenure
# Schema: see /schema/term.schema.yaml. ladm_mapping.relation must be one of:
#   equivalent | refines | extends | conflicts-with | no-counterpart
id: customary-tenure
term: Customary and informal tenure
abbreviation: null
alt_labels:
- Informal tenure
- Customary right
status: draft
category: legal-concept
definition: >-
  Rights held and administered under the customs of a community — frequently communal, often unwritten,
  and in a growing number of jurisdictions carrying formal legal status. The transaction model accommodates
  customary tenure rather than excluding it: *VoL* is tenure-agnostic and operates on non-crisp spatial
  units defined relationally, by sketch, or by text (as LADM's social-tenure profile allows), and *first
  registration* formalises an existing customary or possessory holding through an ordinary *VoI* derivation
  whose authorised source is the formalisation statute or the proven prior holding. The scope boundary
  therefore falls not at customary tenure as such but at un-formalised dealings conducted outside the
  register, which the algebra cannot see until a formalisation pathway brings them in.
see_also:
