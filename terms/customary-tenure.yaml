  notes: 'Outside the formal typology by design: customary holdings need not decompose into the recognised
    incident classes, which is precisely why they are scope-marked rather than modelled.'
ladm_mapping:
  relation: refines
  iso_19152_clause: 'ISO 19152-1:2024, 3.1, term ''right'' (sub-clause >3.1.10, VERIFY; ISO 19152:2012:
    4.1.20 — ''formal or informal entitlement'')'
  notes: 'LADM expressly admits informal and customary tenure within ''right'', and its social-tenure
    profile supplies the non-crisp spatial units. The framework consumes both: the divergence recorded
    in an earlier draft (scope exclusion) is withdrawn — the boundary is formalisation status, not tenure
    type.'
