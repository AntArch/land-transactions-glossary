id: responsibility
term: Responsibility
abbreviation: null
alt_labels: []
status: stable
category: legal-concept
definition: >-
  A positive duty (the holder must perform rather than merely refrain) that may run with land or party
  (e.g., a development contribution, an affordable-housing condition, a maintenance obligation). In Hohfeldian
  terms, a responsibility is the landowners' duty that results from a claim-right held by a third
  party; it differs from a *restriction* only in the direction of the obligation (positive vs negative).
  A responsibility may arise as a component of a reserved incident (imposed by statutory or plan-making
  process) or a conventional incident (a positive covenant in a private instrument). Its discharge status
  is determined by *assessment* and may be enforced as a charge on default. See *Restriction*, *Reserved
  incidents*, *Hohfeldian analysis*.
see_also:
