id: tradable
term: Tradable
abbreviation: null
alt_labels: []
status: stable
category: type-property
definition: >-
  A type-level property of a derived right: whether it can undergo *subsequent, independent* transfers
  on a market *after* its initial allocation. The conveyancing market transacts tradable rights (freehold,
  leasehold, strata, mortgage), which demands persistent, chain-traceable, priority-bearing identifiers.
  Tradability governs *onward* dealing only. Every derived right is allocated once by the alienation pattern
  regardless of tradability; a non-tradable right (an easement) is allocated at grant and thereafter passes
  appurtenant to its parent. Independent of *divisible*; tradability implies referenceability, but not
  the reverse. Restrictable per instance by a recorded term (e.g., a non-assignability covenant).
