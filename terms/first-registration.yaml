# Term record: First registration
# Schema: see /schema/term.schema.yaml. ladm_mapping.relation must be one of:
#   equivalent | refines | extends | conflicts-with | no-counterpart
id: first-registration
term: First registration
abbreviation: null
alt_labels:
- First grant
status: draft
category: transaction-operation
definition: >-
  The originating *derivation* by which a land object and its rights bundle first enter the register —
  by grant from the sovereign or state out of the radical title, by systematic adjudication, or by migration
  of a deeds-evidenced title onto a title register. First registration is the bootstrap case that *good
  root of title* presupposes: before it, validity rests on the instrument chain; after it, the register's
  versioned record carries the burden.
