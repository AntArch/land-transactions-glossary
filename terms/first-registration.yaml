  iso_19152_clause: null
  notes: Not a defined term in Part 1; first-registration processes belong to the land-registration domain
    of ISO 19152-2:2025 (coverage to verify against the published Part 2 text). In Part 1 terms it is
    the creation of the initial versions of the BAUnit, spatial unit, and RRR objects.
