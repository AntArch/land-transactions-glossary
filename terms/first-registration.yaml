id: first-registration
term: First registration
abbreviation: null
alt_labels:
- First grant
status: draft
category: transaction-pattern
definition: >-
  The composite by which a land object and its initial incident first enter the register: a *VoL* originates
  the spatial unit, followed by the operation the incident's jural source determines. Where the state
  is the effective prior holder (state land disposed of in a planned development), the second step is
  a *VoP* from the state's own holding, the state's disposition supplying both power and consent. Where
  a holder already exists under customary, possessory, or informal tenure, the second step is a *VoI*
  derivation whose authorised source is the formalisation statute or the proven prior holding, derivation
  and vesting collapsing into a single act in the existing holder's hands. The absence of a prior registered
  holder does not mean the land is unowned; what varies is the jural source of the initial incident, not
  the primitives. First registration is the bootstrap that *good root of title* presupposes: before it,
  validity rests on the instrument chain; after it, the register's versioned record carries the burden.
