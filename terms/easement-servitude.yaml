applies_to: []
hohfeldian_signature:
  jural_position: claim-right
  correlative: duty
  in_rem: true
  divisible: false
  tradable: false
  notes: 'Servient owner bears the correlative duty (to suffer the use / not interfere). Appurtenant:
    allocated once at grant, thereafter passes with the benefiting parcel — referenceable but not tradable.'
ladm_mapping:
  relation: refines
  iso_19152_clause: 'ISO 19152-1:2024, 3.1, term ''right'' (sub-clause >3.1.10, VERIFY against full text;
    ISO 19152:2012: 4.1.20); appurtenance pattern: ISO 19152-1:2024, 3.1.2, Note 2'
  notes: An LADM right; notably, BAUnit Note 2 describes exactly this glossary's appurtenance behaviour
    — a BAUnit acting as proxy party to hold an easement as an appurtenance to another BAUnit. This term
    adds the derivation/allocation analysis (VoI + single allocating VoP, not tradable onward).
