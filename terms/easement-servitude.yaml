# Term record: Easement / servitude
# Schema: see /schema/term.schema.yaml. ladm_mapping.relation must be one of:
#   equivalent | refines | extends | conflicts-with | no-counterpart
id: easement-servitude
term: Easement / servitude
abbreviation: null
alt_labels:
- Easement
- Servitude
status: stable
category: derivable-type
definition: >-
  A right to use another party's land for a specific, defined purpose (e.g., access, drainage, utility
  corridor). Derived by a VoI and allocated once to the benefiting party by the alienation pattern; being
  appurtenant, it is referenceable but not tradable onward. Thereafter it runs with the land, moving only
  when the parcel it benefits is transferred.
see_also: []
