id: specificity-principle
term: Specificity principle
abbreviation: null
alt_labels: []
status: stable
category: acceptance-principle
definition: >-
  One of the five acceptance criteria, and the only *well-formedness* check (the others test validity).
  Requires that a transaction unambiguously identifies: the *subject* (the Party--Right--Land state being
  changed), the *transformation* (VoP, VoL, or VoI), and the *variables* (the parameters needed to evaluate
  and enact the change).
