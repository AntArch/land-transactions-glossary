id: claim-right
term: Claim-right
abbreviation: null
alt_labels: []
status: stable
category: jural-position
definition: >-
  In Hohfeldian analysis, the jural position of a holder who is entitled to a specific performance from
  a correlative duty-bearer. An entitlement enforceable against an identified party. Distinguished from
  a *privilege*, which merely permits the holder to act without imposing a duty on others. In this paper,
  conventional private-law incidents (leases, mortgages, easements) create claim-rights in their holders;
  duty-correlative reserved incidents (planning obligations, restrictive covenants) instantiate the authority's
  or beneficiary's claim-right with the landowner's duty as its correlative. See *Hohfeldian analysis*,
  *Privilege*, *No-privilege*.
