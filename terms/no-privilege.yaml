id: no-privilege
term: No-privilege
abbreviation: null
alt_labels: []
status: stable
category: jural-position
definition: >-
  In Hohfeldian analysis, the absence of a privilege: the jural position of a party that lacks the freedom
  to perform a given act. In this paper, no-privilege is the precise characterisation of a landowner's
  position with respect to a restricted activity under a public-law constraint. The landowner does not
  hold a duty-not-to-develop (which would imply a claim-right in another party that could be released),
  but rather lacks the privilege to act in the first place. A permit does not lift a restriction; the
  issuing authority vests a privilege from its own jural position. See *Privilege*, *Hohfeldian analysis*,
  *Allocated incidents*, *Reserved incidents*.
