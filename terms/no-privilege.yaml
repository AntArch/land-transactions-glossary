  tradable: null
  notes: 'Deliberate departure from the strict first-order table, where absence of privilege to do A is
    equivalent to a duty not to do A (correlative: another''s claim-right). This paper uses no-privilege
    precisely where there is no releasable private claim-right: the development right is reserved to the
    authority, which holds the corresponding privilege/power in its own jural position. A permit supplies
    a privilege; it does not release a duty.'
