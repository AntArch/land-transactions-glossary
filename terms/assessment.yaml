contrasted_with: []
composed_of: []
applies_to: []
hohfeldian_signature: null
ladm_mapping:
  relation: extends
  iso_19152_clause: ISO 19152-4:2025 (valuation information)
  notes: Part 4 covers the determination of assessed values on a stated basis at a date — the value limb
    of this term. This term extends that pattern to two further derived facts (use-class and compliance/discharge
    status) and makes contestability through the dispute pathway part of the concept.
