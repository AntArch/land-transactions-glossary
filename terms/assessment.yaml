id: assessment
term: Assessment
abbreviation: null
alt_labels: []
status: stable
category: register-operation
definition: >-
  The second write operation of the ecosystem, alongside transactional variation. The authorised determination
  of a *derived fact* about a land object (*value*, *use-class*, or *compliance/discharge status*) as
  at a date, on a stated basis, contestable through the dispute pathway. Assessment ascribes a fact; it
  does not change entitlement and it does not alter the land object.
see_also: []
