id: representation
term: Representation
abbreviation: null
alt_labels: []
status: stable
category: legal-concept
definition: >-
  The legally recognised authority of one party (agent, attorney, company signatory) to act on behalf
  of another in land transactions. The ecosystem must model and verify representation consistently so
  that "who can act for whom?" can be answered auditably at every submission.
