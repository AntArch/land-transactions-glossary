id: separated-ownership
term: Separated ownership
abbreviation: null
alt_labels:
- Conventionally separated ownership
- Severed estate
status: draft
category: legal-concept
definition: >-
  Ownership of immovable property held separately from ownership of the ground beneath or around it [@gretton_steven_2017]:
  mineral estates, strata and sub-strata units, airspace parcels, separately held fishings. Separation
  is effected through conveyancing — a *VoI*/*VoL* composition derives the new ownership object from the
  principal unit — and the jurisdiction's *numerus clausus* determines which separations are recognised.
  *Strata title* is the most common instance.
see_also:
- strata-title
- numerus-clausus
- real-estate-complex
- voi
- vol
broader: conventional-incidents
counterpart_of: null
contrasted_with: []
composed_of: []
applies_to: []
hohfeldian_signature:
  jural_position: claim-right
  correlative: duty
  divisible: null
  tradable: true
  notes: 'An ownership form: the separated estate is a principal object trading on the conveyancing market.
    Which separations exist at all is a numerus clausus question.'
ladm_mapping:
