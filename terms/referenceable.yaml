id: referenceable
term: Referenceable
abbreviation: null
alt_labels: []
status: stable
category: type-property
definition: >-
  The property, required of every first-class object (party, parcel, right, PLR, permit), of carrying
  a durable or at least trusted, authoritative, versioned identifier so that other services can depend
  on it. The foundation for the once-only principle.
