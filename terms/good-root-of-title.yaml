id: good-root-of-title
term: Good root of title
abbreviation: null
alt_labels: []
status: stable
category: register-concept
definition: >-
  The point in a chain of transactions from which title is traced and on the basis of which subsequent
  dealings are validated. In a deeds-register tradition, the choice of root determines what the register
  guarantees; in a title-by-registration system, registration itself provides the root and a state guarantee
  displaces the need to trace further back. The two register traditions are two projections of one ordered
  transaction log differentiated by the position of good root of title [@beck_effect_2022]. See *Amendment*,
  *Bitemporality*, *Priority*.
