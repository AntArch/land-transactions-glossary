id: bundle-of-rights
term: Bundle of rights
abbreviation: null
alt_labels: []
status: stable
category: analytical-framework
definition: >-
  The analysis of property ownership as a collection of separable jural incidents (to possess, use, manage,
  derive income, transmit, and hold residuary character) rather than a single, indivisible entitlement,
  following Honoré [-@honore_ownership_1961]. These incidents normally travel together but can be separated,
  constrained, or reallocated individually. This paper uses *incident* as the preferred general term to
  capture this compound structure. See *Conventional incidents*, *Incident*, *Hohfeldian analysis*.
see_also:
- conventional-incidents
- incident
- hohfeldian-analysis
broader: null
counterpart_of: null
contrasted_with: []
composed_of: []
applies_to: []
hohfeldian_signature: null
ladm_mapping:
