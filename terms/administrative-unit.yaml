id: administrative-unit
term: Administrative unit
abbreviation: null
alt_labels: []
status: stable
category: ladm-construct
definition: >-
  In LADM, the object representing the rights package associated with a parcel: it defines what is held
  and under what conditions. Combined with a spatial unit (geometry), it forms the complete representation
  of a land object.
see_also: []
broader: null
counterpart_of: null
