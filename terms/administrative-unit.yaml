applies_to: []
hohfeldian_signature: null
ladm_mapping:
  relation: refines
  iso_19152_clause: ISO 19152-1:2024, 3.1.2 (basic administrative unit)
  notes: 'Narrower than BAUnit: the glossary definition assumes association with a parcel (one spatial
    unit), whereas a BAUnit comprises zero or more spatial units and need not be cadastral. Substance
    otherwise aligned: the rights package against which unique, homogeneous RRRs are recorded.'
