# Term record: VoL (Variation of Land)
# Schema: see /schema/term.schema.yaml. ladm_mapping.relation must be one of:
#   equivalent | refines | extends | conflicts-with | no-counterpart
id: vol
term: VoL (Variation of Land)
abbreviation: VoL
alt_labels:
- Variation of Land
status: stable
category: transaction-primitive
definition: >-
  A generic transaction pattern that changes *what land* a right bundle describes through subdivision
  or consolidation of spatial units. Because VoL is generic, it applies to any spatially-defined right
  object: cadastral parcels, planning zones, environmental buffers, heritage areas, and other public-law
  restriction (PLR) objects. Any alteration to a PLR's spatial extent (redrawing a zone boundary, extending
  a buffer, splitting a heritage area) is a VoL operation subject to the same acceptance criteria as a
  cadastral subdivision. **A boundary determination that fixes, adjusts, or re-defines authoritative geometry
  is a VoL**. VoL is the operational workhorse of high-velocity land change; it requires geometry integrity
  checks (no gaps or overlaps), recognised survey inputs, and versioned identifier management so that
  permits and rights always reference the correct spatial state.
