id: dispute
term: Dispute
abbreviation: null
alt_labels:
- Dispute pathway
- Objection
status: draft
category: legal-concept
definition: >-
  A transaction any affected party may submit against a specified party-incident-land position, routed
  through the appropriate objection pathway (valuation appeal, planning appeal, boundary or title dispute).
  A dispute requires no operation the algebra does not already contain: if upheld, the adjudicating body
  is empowered to direct a *correction* (an adjudicated amendment), a *rectification* (adjudicator-directed
  primitives with log-level voids as their instrument), or a directed *assessment*. The dispute pathway
  is the second source of power in the change matrix: entitled actors change the world through the gates;
  adjudicators change it through disputes.
