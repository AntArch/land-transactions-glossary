id: acceptance-criteria
term: Acceptance criteria
abbreviation: null
alt_labels: []
status: stable
category: acceptance-principle
definition: >-
  The conditions a transaction submission must satisfy before it is routed to a decision officer. Applied
  as automated gates at the pre-submission stage under five principles: specificity (a well-formedness
  check) and capacity, power, consent, and admissibility (validity checks). Applied in a fail-fast order,
  automated gating prevents avoidable rework without removing officer discretion. There are five gates;
  professional capability is a limb of *capacity*.
