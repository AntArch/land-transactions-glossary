id: numerus-clausus
term: Numerus clausus
abbreviation: null
alt_labels: []
status: stable
category: legal-concept
definition: >-
  Latin for "closed number." The principle that only a defined set of right types can be carved from a
  bundle and vested to third parties; parties cannot create novel incidents with the character of property
  by agreement alone. In this paper, the numerus clausus is the typed registry of derivable incident types
  for a jurisdiction, each carrying a Hohfeldian signature (jural position, correlative, divisibility,
  tradability). The *admissibility* gate checks that a proposed transaction produces an incident within
  this recognised set. See *Admissibility principle*, *Rights Ontology service*, *VoI*.
see_also:
- admissibility-principle
- rights-ontology-service
- voi
