id: rights-ontology-service
term: Rights Ontology service
abbreviation: null
alt_labels: []
status: stable
category: platform-service
definition: >-
  A proposed platform service holding the typed *numerus clausus* for a jurisdiction: the schema of permissible
  incident types, each with its Hohfeldian signature, the power requirements for each transaction type,
  capacity rules, and admissibility constraints. Separating the rules governing what rights *may* exist
  from the register recording what rights *do* exist allows the rule set to be versioned independently
  as legal regimes evolve. See *Numerus clausus*, *Admissibility principle*, *VoI*.
see_also:
- numerus-clausus
- admissibility-principle
- voi
