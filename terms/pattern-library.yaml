id: pattern-library
term: Pattern library
abbreviation: null
alt_labels: []
status: stable
category: transaction-pattern
definition: >-
  A collection of documented, reusable compositions of transaction primitives (VoP, VoL, VoI) covering
  recurring complex scenarios (e.g., real estate complexes, utility corridors, stacked rights in multi-use
  buildings). Patterns allow complex workflows to be assembled from known building blocks without expanding
  the underlying transaction surface.
