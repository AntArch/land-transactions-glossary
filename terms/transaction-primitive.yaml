id: transaction-primitive
term: Transaction primitive
abbreviation: null
alt_labels: []
status: stable
category: transaction-primitive
definition: >-
  One of the three core, reusable state-change patterns (VoP, VoL, VoI) from which land administration
  workflows are composed. Each is a variation representing a subdivision or consolidation along one axis
  of the party--right--land triple. Treating these as primitives keeps the transaction service surface
  small and stable, while allowing complex scenarios to be built as documented compositions.
