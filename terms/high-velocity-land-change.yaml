id: high-velocity-land-change
term: High-velocity land change
abbreviation: null
alt_labels: []
status: stable
category: operating-context
definition: >-
  The operating condition of a large-scale programme in which frequent, overlapping subdivision, consolidation,
  and re-plotting of cadastral units must proceed simultaneously with high-volume permitting and the management
  of complex public-law constraints. The term defines the environment that motivates the ecosystem architecture
  and the transactional primitives (VoP, VoL, VoI) proposed in this paper. See *VoL*, *VoP*, *VoI*, *PLR*.
