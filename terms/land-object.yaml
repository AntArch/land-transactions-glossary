# Term record: Land object
# Schema: see /schema/term.schema.yaml. ladm_mapping.relation must be one of:
#   equivalent | refines | extends | conflicts-with | no-counterpart
id: land-object
term: Land object
abbreviation: null
alt_labels: []
status: stable
category: ladm-construct
definition: >-
  In LADM  the composite entity comprising an *administrative unit* (the rights package)
  and its associated *spatial unit* (geometry/extent). The term emphasises the spatial reference used
  when identifying what land is involved in a transaction or permit. *Property object* refers to the same
  entity emphasised as the first-class holder of a rights bundle from which incidents are derived or into
  which they are absorbed. See *Administrative unit*, *Spatial unit*, *Property object*.
see_also:
- administrative-unit
- spatial-unit
- property-object
broader: null
counterpart_of: null
contrasted_with:
- property-object
composed_of:
- administrative-unit
- spatial-unit
applies_to: []
hohfeldian_signature: null
ladm_mapping:
  relation: extends
  iso_19152_clause: 'ISO 19152-1:2024, 3.1.2 (basic administrative unit) + ISO 19152-1:2024, 3.1, term
    ''spatial unit'' (sub-clause >3.1.10, VERIFY against full text; ISO 19152:2012: 4.1.23)'
  notes: Composite of two LADM terms — the administrative unit (rights package) and its spatial unit (geometry)
    — for which LADM defines no single term. Distinct from LADM 'land' (3.1.8), which is the generic spatial
    extent, not a unitised object.
citations: []
source: 'Beck, A. (2026). Glossary and definitions: the single-source terminology for the land-transactions
  portfolio.'
history:
- version: 1.0.0
  date: '2026-06-10'
  change: Initial release.
