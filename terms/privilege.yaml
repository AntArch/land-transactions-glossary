id: privilege
term: Privilege
abbreviation: null
alt_labels: []
status: stable
category: jural-position
definition: >-
  In Hohfeldian analysis, a freedom to perform an act without owing a duty to any other party to refrain
  from it. Distinguished from a *claim-right*. In this paper, issuing a permit is characterised as the
  authority allocating a privilege from its own jural position to the applicant. It is not restoring a
  pre-existing entitlement to someone from whom it was withheld.
