id: termination
term: Termination
abbreviation: null
alt_labels: []
status: stable
category: transaction-operation
definition: >-
  The ending direction of a *Variation of Incidents*: the operation that closes an existing jural incident.
  Termination takes a form matched to the incident type. *Absorption* applies to conventional incidents:
  the separated claim-right is reintegrated into its parent bundle (on expiry, surrender, or satisfaction
  of the obligation it secured). *Extinguishment* applies to allocated incidents (public-law privileges):
  the privilege simply ceases to exist in the holder's hands (on expiry, revocation, or breach of conditions),
  with nothing returning to any parent holding. *Rescission* applies to reserved incidents: a PLR is brought
  to an end through the same statutory or regulatory process that created it. All three forms are first-class
  operations; recording a derivation without a termination pathway leaves dangling encumbrances. See *Absorption*,
  *Extinguishment*, *Derivation*, *Variation of Incidents*.
