id: overriding-interest
term: Overriding interest
abbreviation: null
alt_labels: []
status: draft
category: legal-concept
definition: >-
  An incident that binds a *land object* without appearing on the register: a class of rights reserved
  by the jurisdiction, typically by statute, that remain enforceable against acquirers despite non-registration.
  Membership varies by jurisdiction — short leases, rights of persons in actual occupation, public rights
  of way, certain customary rights. Overriding interests are the explicit boundary of the *once-only principle*
  as applied to registers: they mark what the register does not promise to show, and *acceptance criteria*
  cannot test against entries that are not there. A register-completeness claim is only as strong as the
  enumerated list of interests that override it.
see_also:
