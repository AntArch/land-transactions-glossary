  notes: Umbrella class whose members carry their own signatures (typically claim-right/duty pairs). The
    defining feature is procedural — enforceability without registration — not a distinct jural position.
ladm_mapping:
  relation: no-counterpart
  iso_19152_clause: null
  notes: LADM models recorded RRRs; an overriding interest is by definition effective while unrecorded,
    so its defining feature falls outside the content model. Once recorded it becomes an ordinary right
    or restriction.
