# Term record: Permit
# Schema: see /schema/term.schema.yaml. ladm_mapping.relation must be one of:
#   equivalent | refines | extends | conflicts-with | no-counterpart
id: permit
term: Permit
abbreviation: null
alt_labels: []
status: stable
category: derivable-type
definition: >-
  A time-bound authorisation issued by a public authority, conferring on the holder a lawful permission
  to undertake an otherwise restricted activity on specified land, subject to defined conditions and an
  effective period.
see_also: []
broader: allocated-incidents
counterpart_of: null
contrasted_with: []
composed_of: []
applies_to: []
hohfeldian_signature:
  jural_position: privilege
  correlative: no-right
  in_rem: false
  divisible: false
  tradable: false
  notes: 'Privilege vested by the authority exercising a statutory power from its own jural position.
    Personal to the holder by default; ends by extinguishment, not absorption. In rem: false — the privilege
    binds as between authority and holder (personal/administrative), not against the world; the Conceptual
    Foundation notes a statutory extraction licence is personal whereas an alienated heritable tenement
    is fully registerable.'
ladm_mapping:
  relation: refines
  iso_19152_clause: ISO 19152-5:2025, term 'permit'
  notes: 'Part 5 defines permit as something granted to a party giving permission to undertake an otherwise
    restricted activity. This term refines it: issued by a public authority, time-bound, condition-bearing,
    with an effective period — aligning the LADM Part 5 concept with the allocated-incident lifecycle
    model.'
citations: []
source: 'Beck, A. (2026). Glossary and definitions: the single-source terminology for the land-transactions
  portfolio.'
history:
