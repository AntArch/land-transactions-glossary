id: rectification
term: Rectification
abbreviation: null
alt_labels: []
status: draft
category: register-operation
definition: >-
  A dispute outcome in which an adjudicator determines that the party-incident-land triple itself is wrongly
  stated — the wrong holder registered, an incident existing that should not, a transaction in the chain
  void or procured by fraud — and restores the lawful position. Rectification operates through two instruments
  under the adjudicator's power: voiding the wrongly registered transactions (a *status change* on the
  log) and directing new *VoP*, *VoL*, or *VoI* primitives until the register reflects the position the
  law recognises as correct. It is therefore not an amendment but an adjudicator-directed sequence of
  ordinary primitives, bounded by the *dispute* pathway and the adjudicator's empowerment. Its bitemporal
  signature: rectification does not itself move valid time, though the primitives it directs may establish
  a new valid-time state. Distinguished from *Correction* (triple intact; content restated) and *Amendment*
  (party-driven; terms change; valid time moves).
