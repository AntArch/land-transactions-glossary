id: rectification
term: Rectification
abbreviation: null
alt_labels: []
status: draft
category: register-operation
definition: >-
  A custodian-initiated correction of the register where a recorded entry is found to be mistaken and
  the mistake prejudicially affects a registered party's position. Rectification is not a transaction:
  no party exercises a power over an incident; the *authoritative custodian* exercises its *mandate* to
  make the register conform to the underlying jural reality. Under *bitemporality* the erroneous entry
  and its rectification both remain visible on the transaction timeline, preserving the audit trail and
  any indemnity consequences of reliance on the error. Distinguished from *Amendment* (a party-initiated
  variation of an incident's terms) and from *Correction* (routine custodian updates that prejudice no
  one).
see_also:
