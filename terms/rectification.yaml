  iso_19152_clause: null
  notes: LADM has no register-write vocabulary; a rectification is visible only as a new version of the
    affected object (VersionedObject, ISO 19152-1:2024, 6.3.1) with the evidencing decision recorded as
    an administrative source (ISO 19152-2:2025). The prejudice/indemnity distinction is not modelled.
