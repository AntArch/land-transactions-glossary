term: API (Application Programming Interface)
abbreviation: API
alt_labels:
- Application Programming Interface
status: stable
category: technology
definition: >-
  A defined contract through which one software service requests information or actions from another.
  An API-first design means authoritative services expose their data and functions through stable, documented,
  machine-readable interfaces that other systems can reliably consume.
