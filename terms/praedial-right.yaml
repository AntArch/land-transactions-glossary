id: praedial-right
term: Praedial right
abbreviation: null
alt_labels: []
status: stable
category: derivable-type
definition: >-
  A right that attaches to land rather than to a person, and runs with the land when it is transferred.
  A praedial relationship means that one parcel holds rights in another parcel, with those rights passing
  automatically to whoever owns the benefiting parcel. The cadastral unit holding the right carries no
  independent legal standing: exercise is delegated to the head right holder — the registered proprietor
  of the dominant tenement — who holds the appurtenant right by virtue of holding the head right over
  that unit, not by personal grant.
