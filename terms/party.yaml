# Term record: Party
# Schema: see /schema/term.schema.yaml. ladm_mapping.relation must be one of:
#   equivalent | refines | extends | conflicts-with | no-counterpart
id: party
term: Party
abbreviation: null
alt_labels: []
status: stable
category: ladm-construct
definition: >-
  In LADM, an entity (e.g., natural person, legal person, or organisation) that can hold registerable
  rights or act in land transactions. Parties also possess *powers* that determine what transactions they
  can lawfully initiate or consent to. Collective holders such as trusts act as a single party: the trust
  (or its trustees in that capacity) holds the registered incidents, while beneficial interests behind
  it remain off-register.
