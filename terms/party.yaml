    ISO 19152:2012: 4.1.13); group party: ISO 19152-1:2024, 3.1.7'
  notes: Matches LADM party (person or organisation that can hold RRRs and act in transactions); LADM
    adds group party (3.1.7) and party member structure. The note that parties possess powers determining
    what they can initiate is this glossary's Hohfeldian addition.
