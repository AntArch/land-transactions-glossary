# Term record: Amendment
# Schema: see /schema/term.schema.yaml. ladm_mapping.relation must be one of:
#   equivalent | refines | extends | conflicts-with | no-counterpart
id: amendment
term: Amendment
abbreviation: null
alt_labels:
- Modification
status: stable
category: transaction-operation
definition: >-
  A change to the *terms* of an existing right relationship (a lease extension, a rent review, a change
  to an easement's scope) where holder, land, and the right's existence are unchanged. Modelled as a continuing
  version of the same right relationship under its durable identifier (not as absorption followed by a
  fresh derivation) so that continuity-dependent facts (commencement date, accrued priority, qualifying
  periods) survive. An amendment is one of the three world-state operations alongside variation and assessment
  — changing the terms of an existing incident is an amendment, not a *VoI* — and its bitemporal signature
  distinguishes it from the dispute outcomes: an amendment is party-driven, runs the normal gates, and
  moves valid time; a *correction* restates valid time; a *rectification* changes the triple.
see_also:
- correction
- rectification
- assessment
broader: null
counterpart_of: null
contrasted_with: []
composed_of: []
applies_to: []
hohfeldian_signature: null
ladm_mapping:
  relation: refines
  iso_19152_clause: ISO 19152-1:2024, 6.3.1 (VersionedObject)
  notes: Realised in LADM as a new version of the same RRR instance under its identifier — which is exactly
    the continuing-version semantics this term mandates. LADM supplies the mechanism but does not name
    the operation or contrast it with terminate-and-re-derive.
citations: []
source: 'Beck, A. (2026). Glossary and definitions: the single-source terminology for the land-transactions
  portfolio.'
