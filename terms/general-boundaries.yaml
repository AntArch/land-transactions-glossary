id: general-boundaries
term: General boundaries
abbreviation: null
alt_labels:
- Fixed boundaries
status: draft
category: register-concept
definition: >-
  A boundary-fixation policy under which the register records the approximate extent of a *spatial unit*:
  the line shown on the mapbase indicates but does not determine the exact legal boundary, which remains
  a matter of the underlying instruments and physical features. The alternative is fixed (coordinated)
  boundaries, where the register's geometry is itself authoritative. The policy in force conditions what
  *VoL* operations can claim and what the *cadastral index* warrants: under general boundaries the index's
  geometry is a derived view of evidence, not the evidence itself.
