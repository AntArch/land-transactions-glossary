id: status-change
term: Status change
abbreviation: null
alt_labels: []
status: draft
category: register-concept
definition: >-
  An annotation applied to a recorded transaction or version on the transaction log — effective, disputed,
  void, superseded, corrected, rectified — that asserts nothing new about the world-state. A status change
  is never a deletion: a void does not itself change who holds what; it declares that the recorded transaction
  never validly changed anything in the first place. Status changes are not submitted through the acceptance
  gates; they are directed by the *dispute* pathway against records already in the log. They are the log-level
  complement of the three world-state operations (variation, *amendment*, *assessment*).
