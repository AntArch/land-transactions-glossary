id: plan-hierarchy
term: Plan hierarchy
abbreviation: null
alt_labels: []
status: stable
category: legal-concept
definition: >-
  The layered structure of planning and land regulation instruments (national policy, regional plan, local
  plan, site-level conditions) in which lower-tier instruments must conform with those above them. The
  admissibility gate applies at two levels: it checks that a proposed transaction conforms with applicable
  PLR constraints *and* that any plan-making instrument is consistent with the tier above it. See *Admissibility
  principle*, *PLR*, *Reserved incidents*.
see_also:
- admissibility-principle
- plr
- reserved-incidents
broader: null
counterpart_of: null
contrasted_with: []
composed_of: []
applies_to: []
hohfeldian_signature: null
ladm_mapping:
  relation: refines
  iso_19152_clause: ISO 19152-5:2025 (plan unit / plan block / plan group)
  notes: Part 5 models the structural hierarchy of spatial plans. This term adds the normative rule the
    structure exists to enforce (lower-tier instruments must conform with those above) and routes that
    rule through the admissibility gate.
