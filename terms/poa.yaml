# Term record: PoA (Power of Attorney)
# Schema: see /schema/term.schema.yaml. ladm_mapping.relation must be one of:
#   equivalent | refines | extends | conflicts-with | no-counterpart
id: poa
term: PoA (Power of Attorney)
abbreviation: PoA
alt_labels:
- Power of Attorney
status: stable
category: legal-concept
definition: >-
  A legal instrument by which a principal authorises a named attorney to act on their behalf for defined
  purposes. In this strategy, a PoA is a representation instrument: the attorney holds no independent
  power, so the power and capacity acceptance checks run against the *principal*. The *Party and Representation
  service* must verify that the PoA is valid, current, and covers the proposed transaction type; an enduring
  PoA additionally requires confirmation that capacity was present at execution. See *Representation*,
  *Capacity principle*, *Power principle*.
see_also:
- representation
- capacity-principle
- power-principle
broader: representation
