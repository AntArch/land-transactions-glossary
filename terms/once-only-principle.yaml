id: once-only-principle
term: Once-only principle
abbreviation: null
alt_labels: []
status: stable
category: design-principle
definition: >-
  The design principle that authoritative information should be recorded and maintained once by the responsible
  custodian and reused by other agencies through governed services, rather than re-entered or re-created
  in local copies that may diverge. See also: *authoritative custodian*, *shadow infrastructure*.
see_also:
- authoritative-custodian
- shadow-infrastructure
