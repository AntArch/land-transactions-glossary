id: priority
term: Priority
abbreviation: null
alt_labels: []
status: stable
category: register-concept
definition: >-
  The ranking between competing rights over the same land object (typically securities). A property of
  the *relationship* between rights, not of any single right: the default order derives from valid time
  (first in time) and is overridden by explicit subordination, postponement, or tacking transactions.
  A change of priority is itself a first-class, validated transaction.
