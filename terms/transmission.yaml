id: transmission
term: Transmission
abbreviation: null
alt_labels: []
status: draft
category: transaction-operation
definition: >-
  A *VoP* that occurs by operation of law rather than by consensual dealing: the holder's death (passing
  to personal representatives or heirs), insolvency (vesting in a trustee or liquidator), or dissolution
  of a corporate holder (passing as bona vacantia or under a court vesting order). Transmission qualifies
  the *consent principle*: the authorisation for the variation is supplied by statute, court order, or
  a personal representative rather than by the granting party. The incidents themselves are unchanged
  — transmission moves the holder, not the content of the bundle.
