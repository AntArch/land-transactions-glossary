id: encumbrance
term: Encumbrance
abbreviation: null
alt_labels:
- Burden
status: stable
category: legal-concept
definition: >-
  A right held by a third party that limits the full exercise or transfer of property (e.g., a mortgage,
  easement, or restrictive covenant).
