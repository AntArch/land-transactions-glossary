  tradable: null
  notes: 'Umbrella term: the third party holds a claim-right against the encumbered estate. Divisibility/tradability
    vary by the underlying incident type (mortgage tradable; restrictive covenant not).'
ladm_mapping:
  relation: no-counterpart
  iso_19152_clause: null
  notes: 'Spans LADM categories rather than mapping to one: an encumbrance may be an LADM right (easement)
    or restriction (covenant); ISO 19152:2012 modelled mortgage as a special restriction (LA_Mortgage).
    No umbrella term is defined.'
