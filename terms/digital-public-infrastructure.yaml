id: digital-public-infrastructure
term: Digital Public Infrastructure
abbreviation: DPI
alt_labels: []
status: draft
category: design-principle
definition: >-
  The shared, foundational digital systems through which states deliver public services at scale: a set
  of interoperable systems built on open standards providing equitable access to public and private services,
  distinguishing foundational layers (identity, registries, data exchange) that are invested in once and
  shared from the application services built on top. The land-transactions framework is the land-sector
  instantiation: authoritative registers exposed as governed services, bound by shared *durable identifiers*
  and the *once-only principle*, with transaction logic any programme can compose rather than rebuild.
  The ecosystem, not the individual agency, is the unit of design.
