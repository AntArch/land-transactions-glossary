id: transaction-algebra
term: Transaction algebra
abbreviation: null
alt_labels: []
status: draft
category: analytical-framework
definition: >-
  The framework's answer to how party-incident-land relationships change: three interdependent layers
  forming a transactional grammar. Transaction principles (the *acceptance criteria*) constrain what is
  permissible; *transaction primitives* (VoP, VoL, VoI) express what is possible; *pattern libraries*
  demonstrate what is practical. The algebra distinguishes three world-state operations — variation (changes
  the triple), *amendment* (terms only, same durable identifier), and *assessment* (ascribes a derived
  fact) — which are exhaustive at the level of the world-state, plus log-level *status changes* directed
  through the *dispute* pathway. LADM tells you what exists; the algebra specifies how changes to that
  state must be formed and governed.
